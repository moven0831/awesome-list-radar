name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: bun install --frozen-lockfile

      - name: Type check
        run: bun run lint

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Verify dist/ is up to date
        run: |
          git diff --exit-code dist/ || (echo "dist/ is out of date. Run 'bun run build' and commit." && exit 1)
